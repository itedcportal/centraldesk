<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Mengalihkan...</title>
    
    <meta http-equiv="refresh" content="2; url=https://script.google.com/a/macros/bam-dr.com/s/AKfycbwkD7QWcl6U91Zcxq4eLaIdySgOi1KR4OQWrGy7CJqnlLkTVj0kIlWwl3KiMXB3Zw9Q/exec">
    
    <script>
        setTimeout(function() {
            window.location.href = "https://script.google.com/a/macros/bam-dr.com/s/AKfycbwkD7QWcl6U91Zcxq4eLaIdySgOi1KR4OQWrGy7CJqnlLkTVj0kIlWwl3KiMXB3Zw9Q/exec";
        }, 2000);
    </script>

    <style>
        /* Reset dasar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Latar belakang dan penempatan elemen di tengah */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #2c3e50;
        }

        /* Kotak loading bergaya modern */
        .loading-container {
            text-align: center;
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }

        /* Animasi Spinner melingkar premium */
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #0056b3; /* Warna aksen biru profesional */
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Tipografi */
        h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }

        /* Efek teks redup-terang */
        .pulse-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Tautan manual yang tersembunyi namun tetap bisa diakses jika error */
        .manual-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 13px;
            color: #a0a0a0;
            text-decoration: none;
            transition: color 0.3s;
        }

        .manual-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="spinner"></div>
        
        <h2>Menyiapkan Halaman</h2>
        
        <p class="pulse-text">Harap tunggu sebentar, Anda sedang dialihkan ke sistem yang aman...</p>
        
        <a href="https://script.google.com/a/macros/bam-dr.com/s/AKfycbwkD7QWcl6U91Zcxq4eLaIdySgOi1KR4OQWrGy7CJqnlLkTVj0kIlWwl3KiMXB3Zw9Q/exec" class="manual-link">
            Klik di sini jika tidak dialihkan secara otomatis
        </a>
    </div>

</body>
</html>
